# ── Cấu hình Backend - Data Labeling Support System ─────────────────────────
# Có thể ghi đè bằng biến môi trường (VD: SUPABASE_URL=...)
# Supabase: Dashboard → Project Settings → API (URL, service_role) và Storage (tạo bucket data-items)

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # --- MÔI TRƯỜNG LOCAL (Chạy mượt nhất ở máy cá nhân) ---
    url: jdbc:postgresql://localhost:5433/data_labeling_db
    username: postgres
    password: 12345
    
    # --- MÔI TRƯỜNG SUPABASE (Bỏ dấu # để dùng khi cần đẩy lên team) ---
    # url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.wqillyzrmdbjvxfnckhx.supabase.co:5432/postgres?sslmode=require}
    # username: ${SPRING_DATASOURCE_USERNAME:postgres}
    # password: ${SPRING_DATASOURCE_PASSWORD:SofwareDevelopemnt}
    
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger

# ── JWT ─────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:MyDefaultSuperSecretKeyThatIsAtLeast256BitsLong!!}
  expiration-ms: ${JWT_EXPIRATION:86400000}   # 24 hours

# ── Supabase (Storage upload file) ───────────────────────────────────────────
supabase:
  url: https://wqillyzrmdbjvxfnckhx.supabase.co
  service-key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndxaWxseXpybWRianZ4Zm5ja2h4Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDA1OTI0NCwiZXhwIjoyMDg1NjM1MjQ0fQ.QoLHcdLK7YYs1m9uVkaRAWio-GSw39VZhXbtDDOIrJQ
  storage:
    bucket: data-items

# ── Upload local (fallback khi Supabase lỗi; dùng đường dẫn tuyệt đối tránh FileNotFoundException) ─
app:
  upload:
    dir: ${UPLOAD_DIR:${user.home}/.data-labeling/uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}
